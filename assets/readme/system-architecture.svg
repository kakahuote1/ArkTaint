      .panel-gray { fill: #f8fafc; stroke: #64748b; stroke-width: 2; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.6; filter: url(#soft-shadow); }
      .node-blue { fill: #ffffff; stroke: #60a5fa; stroke-width: 1.7; filter: url(#soft-shadow); }
      .node-green { fill: #ffffff; stroke: #34d399; stroke-width: 1.7; filter: url(#soft-shadow); }
      .node-orange { fill: #ffffff; stroke: #fb923c; stroke-width: 1.7; filter: url(#soft-shadow); }
      .node-purple { fill: #ffffff; stroke: #a78bfa; stroke-width: 1.7; filter: url(#soft-shadow); }
      .label { font-family: "Microsoft YaHei", "Noto Sans SC", "PingFang SC", Arial, sans-serif; fill: #0f172a; font-weight: 700; font-size: 25px; }
      .text { font-family: "Microsoft YaHei", "Noto Sans SC", "PingFang SC", Arial, sans-serif; fill: #0f172a; font-size: 20px; font-weight: 650; }
      .sub { font-family: "Microsoft YaHei", "Noto Sans SC", "PingFang SC", Arial, sans-serif; fill: #334155; font-size: 17px; font-weight: 500; }
      .small { font-family: "Microsoft YaHei", "Noto Sans SC", "PingFang SC", Arial, sans-serif; fill: #334155; font-size: 16px; font-weight: 500; }
      .blue { stroke: #2563eb; }
      .green { stroke: #0f766e; }
      .orange { stroke: #ea580c; }
      .edge { fill: none; stroke-width: 4; stroke-linecap: square; stroke-linejoin: miter; }
      .thin-edge { fill: none; stroke-width: 2.2; stroke-linecap: square; stroke-linejoin: miter; }
      .dashed { stroke-dasharray: 12 10; }
